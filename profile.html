<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>소소책방 | 내정보</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        suit: ['Suit', 'sans-serif'],
        haeong: ['KookminUniversityHaeongSans', 'sans-serif']
      },
      colors: {
        primary: { DEFAULT: "#1C1C1E", hover: "#38383A" },
        accent: { bg: "#4F7C6B", text: "#FFFFFF", hover: "#386052" },
        surface: "#F7F6F2",
        container: "#FFFFFF",
        borderColor: "#E5E5E0"
      },
      boxShadow: { soft: "0 8px 30px rgba(0,0,0,0.03)" },
      borderRadius: { xl: "18px" }
    }
  }
}
  </script>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
  <link rel="stylesheet" href="./css/style.css">

  <style>
    /* ===========================
       SUIT Font Face
    =========================== */
    @font-face {
      font-family: 'Suit';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Light.woff2') format('woff2');
      font-weight: 300;
      font-display: swap;
    }
    @font-face {
      font-family: 'Suit';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Regular.woff2') format('woff2');
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: 'Suit';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Medium.woff2') format('woff2');
      font-weight: 500;
      font-display: swap;
    }
    @font-face {
      font-family: 'Suit';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Bold.woff2') format('woff2');
      font-weight: 600;
      font-display: swap;
    }

    /* ===========================
       KookminUniversityHaeongSans Font Face
    =========================== */
    @font-face {
      font-family: 'KookminUniversityHaeongSans';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2310@1.0/KookminUniversityHaeongSans.woff2') format('woff2');
      font-weight: 400;
      font-display: swap;
    }

    body {
      font-family: 'Suit', sans-serif;
      font-weight: 400;
      letter-spacing: -0.015em;
    }
    input, button, select, textarea {
      font-family: 'Suit', sans-serif;
    }
    .font-haeong {
      font-family: 'KookminUniversityHaeongSans', sans-serif;
    }
    .font-suit {
      font-family: 'Suit', sans-serif;
    }
  </style>

  <script src="./js/app.js" defer></script>
  <script src="./js/api.js" defer></script>
  <script src="./js/ui.js" defer></script>
  <script src="./js/utils.js" defer></script>
  <script src="./js/profile.js" defer></script>
</head>

<body class="bg-surface text-onSurface font-suit text-[15px] font-normal tracking-[-0.015em]">

  <!-- Header -->
  <header class="bg-container shadow-soft sticky top-0 z-50">
    <div class="max-w-[1400px] mx-auto px-4 h-16 flex items-center justify-between">
      <a href="index.html" class="font-haeong text-[26px] font-normal tracking-[-0.04em]">소소책방</a>

      <nav class="hidden md:flex items-center gap-1 font-suit text-[16px] font-medium tracking-[-0.02em]">
        <a href="index.html" class="px-4 py-2 rounded-full hover:bg-gray-100 hover:text-gray-900 transition-all duration-200">홈</a>
        <a href="books.html" class="px-4 py-2 rounded-full hover:bg-gray-100 hover:text-gray-900 transition-all duration-200">도서대여</a>
        <a href="rentals.html" class="px-4 py-2 rounded-full hover:bg-gray-100 hover:text-gray-900 transition-all duration-200">대여현황</a>
        <a href="profile.html" class="px-4 py-2 rounded-full bg-[#E04825] text-white font-medium shadow-sm">내정보</a>
        <button id="logoutBtn" class="px-4 py-2 rounded-full text-gray-500 hover:bg-red-50 hover:text-red-500 transition-all duration-200">로그아웃</button>
      </nav>
    </div>
  </header>

  <main class="max-w-[1400px] mx-auto px-4 py-8">

    <h2 class="font-suit text-[24px] font-medium tracking-[-0.025em] mb-6">내 정보</h2>

    <div id="profileContainer" class="bg-container rounded-xl shadow-soft p-6 mb-8">
      <div class="flex justify-center py-8">
        <span class="material-symbols-outlined animate-spin text-gray-400">
          progress_activity
        </span>
      </div>
    </div>

    <!-- 회원탈퇴 버튼 -->
    <div class="flex justify-end">
      <button
        id="withdrawBtn"
        class="inline-flex items-center gap-2 px-6 py-3 rounded-xl font-suit text-[15px] font-semibold tracking-[-0.015em] text-white transition-all duration-200 shadow-md hover:shadow-lg hover:scale-[1.02] active:scale-95"
        style="background:#E04825;"
      >
        <span
          class="material-symbols-outlined"
          style="font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;"
        >
          delete
        </span>
        회원탈퇴
      </button>
    </div>

  </main>

  <div
    id="toastContainer"
    class="fixed bottom-4 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2">
  </div>

</body>
</html>
