<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>소소책방 | 도서검색</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="./js/tailwind-config.js"></script>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
  <link rel="stylesheet" href="./css/style.css">

  <style>
    /* ===========================
        SUIT Font Face
    =========================== */
    @font-face {
      font-family: 'Suit';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Light.woff2') format('woff2');
      font-weight: 300;
      font-display: swap;
    }
    @font-face {
      font-family: 'Suit';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Regular.woff2') format('woff2');
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: 'Suit';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Medium.woff2') format('woff2');
      font-weight: 500;
      font-display: swap;
    }
    @font-face {
      font-family: 'Suit';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Bold.woff2') format('woff2');
      font-weight: 600;
      font-display: swap;
    }

    /* ===========================
        KookminUniversityHaeongSans Font Face
    =========================== */
    @font-face {
      font-family: 'KookminUniversityHaeongSans';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2310@1.0/KookminUniversityHaeongSans.woff2') format('woff2');
      font-weight: 400;
      font-display: swap;
    }

    body {
      font-family: 'Suit', sans-serif;
      font-weight: 400;
      letter-spacing: -0.015em;
    }
    input, button, select, textarea {
      font-family: 'Suit', sans-serif;
    }
    .font-haeong {
      font-family: 'KookminUniversityHaeongSans', sans-serif;
    }
    .font-suit {
      font-family: 'Suit', sans-serif;
    }
  </style>

  <script src="./js/app.js" defer></script>
  <script src="./js/api.js" defer></script>
  <script src="./js/ui.js" defer></script>
  <script src="./js/utils.js" defer></script>
  <script src="./js/books.js" defer></script>
</head>

<body class="bg-surface text-onSurface font-suit text-[15px] font-normal tracking-[-0.015em]">

<header class="bg-container shadow-soft sticky top-0 z-50">
  <div class="max-w-[1400px] mx-auto px-4 h-16 flex items-center justify-between">

    <a href="index.html" class="flex flex-col leading-none">
      <span class="text-[8px] font-suit font-medium tracking-[-0.01em] text-gray-400 mb-0.5">남양주시 문화의집</span>
      <span class="font-haeong text-[26px] font-normal tracking-[-0.04em] text-accent-bg">소소책방</span>
    </a>

    <nav class="hidden md:flex items-center gap-1 font-suit text-[16px] font-medium tracking-[-0.02em]">

      <a href="index.html"
         class="px-4 py-2 rounded-full hover:bg-gray-100 hover:text-gray-900 transition-all duration-200">
        홈
      </a>

      <!-- 📌 브랜드 액센트 컬러 시맨틱 클래스로 통일 -->
      <a href="books.html"
         class="px-4 py-2 rounded-full bg-accent-bg text-white font-medium shadow-sm">
        도서대여
      </a>

      <a href="rentals.html"
         class="px-4 py-2 rounded-full hover:bg-gray-100 hover:text-gray-900 transition-all duration-200">
        대여현황
      </a>

      <a href="profile.html"
         class="px-4 py-2 rounded-full hover:bg-gray-100 hover:text-gray-900 transition-all duration-200">
        내정보
      </a>

      <button
        id="logoutBtn"
        class="px-4 py-2 rounded-full text-gray-500 hover:bg-red-50 hover:text-red-500 transition-all duration-200">
        로그아웃
      </button>

    </nav>

  </div>
</header>


<main class="max-w-[1400px] mx-auto px-4 py-8">


<div class="flex flex-col lg:flex-row items-center justify-between gap-4 mb-8">


<div class="relative w-full lg:max-w-2xl">

<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
search
</span>


<input
type="text"
id="searchInput"
placeholder="도서명, 저자, 출판사, ISBN"
class="w-full h-14 pl-12 pr-5 rounded-2xl bg-container shadow-soft border-0 outline-none focus:ring-2 focus:ring-gray-300 font-suit text-[15px] font-normal tracking-[-0.015em]">


</div>



<div class="flex items-center gap-3 flex-wrap">


<button
id="availableBtn"
type="button"
class="h-14 px-6 rounded-2xl bg-white shadow-soft font-suit text-[16px] font-medium tracking-[-0.02em] text-gray-700 transition-all hover:bg-gray-100">
대여가능도서 보기
</button>


<input
id="availableOnly"
type="checkbox"
class="hidden">



<select
 id="sortSelect"
 class="appearance-none h-14 pl-5 pr-12 rounded-2xl bg-white shadow-soft border-0 focus:ring-2 focus:ring-gray-300 font-suit text-[15px] font-normal tracking-[-0.015em] text-gray-700">

    <option value="title">제목순</option>
    <option value="new">신간순</option>
    <option value="popular">인기순</option>

</select>




<select
 id="categorySelect"
 class="appearance-none h-14 pl-5 pr-12 rounded-2xl bg-white shadow-soft border-0 focus:ring-2 focus:ring-gray-300 font-suit text-[15px] font-normal tracking-[-0.015em] text-gray-700">

<option value="">전체 카테고리</option>

</select>


</div>


</div>


<div id="categoryFilterBar" class="hidden mb-6 flex items-center gap-2 font-suit text-[14px] font-light tracking-[-0.01em]">

<span class="text-gray-500">
카테고리:
</span>

<span id="categoryFilterLabel"
class="px-3 py-1 bg-gray-100 text-gray-700 rounded-full font-semibold">
</span>

<button id="clearCategoryBtn" class="text-gray-400 hover:text-red-500 underline">
해제
</button>

</div>



<div id="booksList" class="flex flex-col gap-4">
</div>


<div id="loadingTrigger" class="h-20 flex items-center justify-center mt-8">
</div>


</main>


<div id="toastContainer" class="fixed bottom-4 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2">
</div>


</body>
</html>
