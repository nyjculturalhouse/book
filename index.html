<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소소책방 | 홈</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="./js/tailwind-config.js"></script>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
<link rel="stylesheet" href="./css/style.css">

<style>
/* ===========================
   SUIT Font
=========================== */
@font-face {
  font-family:'Suit';
  src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Light.woff2') format('woff2');
  font-weight:300;
  font-display:swap;
}
@font-face {
  font-family:'Suit';
  src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Regular.woff2') format('woff2');
  font-weight:400;
  font-display:swap;
}
@font-face {
  font-family:'Suit';
  src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Medium.woff2') format('woff2');
  font-weight:500;
  font-display:swap;
}
@font-face {
  font-family:'Suit';
  src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Bold.woff2') format('woff2');
  font-weight:600;
  font-display:swap;
}

/* ===========================
   KookminUniversityHaeongSans Font
=========================== */
@font-face {
  font-family:'KookminUniversityHaeongSans';
  src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2310@1.0/KookminUniversityHaeongSans.woff2') format('woff2');
  font-weight:400;
  font-display:swap;
}

body {
  font-family:'Suit',sans-serif;
  font-weight:400;
  letter-spacing:-0.015em;
}
input, button, select, textarea {
  font-family:'Suit',sans-serif;
}
.font-haeong {
  font-family:'KookminUniversityHaeongSans',sans-serif;
  font-weight:400;
  letter-spacing:-0.045em;
}
.font-suit {
  font-family:'Suit',sans-serif;
}
</style>

<!-- 모듈 로드 순서 정렬 -->
<script src="./js/api.js" defer></script>
<script src="./js/ui.js" defer></script>
<script src="./js/utils.js" defer></script>
<script src="./js/app.js" defer></script>
</head>

<body class="bg-surface text-onSurface font-suit text-[15px] font-normal tracking-[-0.015em]">

  <!-- 📌 상단 네비게이션 헤더 (다른 페이지들과 동일한 max-w-[1400px] 규격 + 전체 메뉴로 통일) -->
  <header class="bg-container shadow-soft sticky top-0 z-50">
    <div class="max-w-[1400px] mx-auto px-4 h-16 flex items-center justify-between">

      <a href="index.html" class="flex flex-col leading-none">
        <span class="text-[8px] font-suit font-medium tracking-[-0.01em] text-gray-400 mb-0.5">남양주시 문화의집</span>
        <span class="font-haeong text-[26px] font-normal tracking-[-0.04em] text-accent-bg">소소책방</span>
      </a>

      <nav class="hidden md:flex items-center gap-1 font-suit text-[16px] font-medium tracking-[-0.02em]">
        <a href="index.html" class="px-4 py-2 rounded-full bg-accent-bg text-white font-medium shadow-sm">
          홈
        </a>
        <a href="books.html" class="px-4 py-2 rounded-full hover:bg-gray-100 hover:text-gray-900 transition-all duration-200">
          도서대여
        </a>
        <a href="rentals.html" class="px-4 py-2 rounded-full hover:bg-gray-100 hover:text-gray-900 transition-all duration-200">
          대여현황
        </a>
        <a href="profile.html" class="px-4 py-2 rounded-full hover:bg-gray-100 hover:text-gray-900 transition-all duration-200">
          내정보
        </a>
        <button id="logoutBtn" class="px-4 py-2 rounded-full text-gray-500 hover:bg-red-50 hover:text-red-500 transition-all duration-200">
          로그아웃
        </button>
      </nav>

    </div>
  </header>

  <!-- 📌 메인 레이아웃: 헤더와 동일한 폭(max-w-[1400px])으로 통일하고, 실제 콘텐츠는 가독성을 위해 내부에서 좁은 컬럼으로 중앙 정렬 -->
  <main class="max-w-[1400px] mx-auto px-4 py-10">
    <div class="mx-auto flex flex-col gap-16">

      <!-- 신간 도서 목록 -->
      <section>
        <div class="flex items-center justify-between mb-5">
          <h2 class="font-suit text-[24px] font-medium tracking-[-0.025em]">신간 도서</h2>
          <a href="books.html?sort=new" class="font-suit text-[14px] font-light tracking-[-0.01em] text-gray-400 hover:text-accent-bg">
            전체보기
          </a>
        </div>
        <div id="newBooksList" class="flex flex-col gap-3">
          <!-- 동적으로 주입됩니다 -->
        </div>
      </section>

      <!-- 인기 도서 TOP 5 -->
      <section>
        <div class="flex items-center justify-between mb-5">
          <h2 class="font-suit text-[24px] font-medium tracking-[-0.025em]">인기 도서 TOP 5</h2>
          <a href="books.html?sort=popular" class="font-suit text-[14px] font-light tracking-[-0.01em] text-gray-400 hover:text-accent-bg">
            전체보기
          </a>
        </div>
        <div id="popularBooksList" class="flex flex-col gap-3">
          <!-- 동적으로 주입됩니다 -->
        </div>
      </section>

    </div>
  </main>

  <!-- 토스트 알림 컴포넌트 -->
  <div id="toastContainer" class="fixed bottom-4 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2"></div>

  <!-- 📌 라이선스 푸터: id="soso-license-footer"를 명시해 app.js의 자동 삽입과 중복되지 않도록 처리 -->
  <footer id="soso-license-footer" class="mt-12 mb-24 w-full text-center text-[12px] sm:text-[14px] font-light tracking-[-0.01em] text-gray-400/90 leading-relaxed">
    <p>
      본 사이트는 국민대학교 KMU80 성곡해옹 폰트를 사용하고 있습니다.<br>
      해당 폰트의 지식재산권은 국민대학교에 있으며,<br>
      CC BY-ND(저작자표시-변경금지) 라이선스 조건에 따라 사용되었습니다.
    </p>
  </footer>

</body>
</html>
