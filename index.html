<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>소소책방 | 홈</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        suit: ['Suit', 'sans-serif'],
        haeong: ['KookminUniversityHaeongSans', 'sans-serif']
      },
      colors: {
        primary: { DEFAULT: "#1C1C1E", hover: "#38383A" },
        accent: { bg: "#4F7C6B", text: "#FFFFFF", hover: "#386052" },
        surface: "#F7F6F2",
        container: "#FFFFFF",
        borderColor: "#E5E5E0"
      },
      boxShadow: { soft: "0 8px 30px rgba(0,0,0,0.03)" },
      borderRadius: { xl: "18px" }
    }
  }
}

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

<style>

/* ===========================
   SUIT
=========================== */
@font-face {
  font-family:'Suit';
  src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Light.woff2')
  format('woff2');
  font-weight:300;
  font-display:swap;
}

@font-face {
  font-family:'Suit';
  src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Regular.woff2')
  format('woff2');
  font-weight:400;
  font-display:swap;
}

@font-face {
  font-family:'Suit';
  src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Medium.woff2')
  format('woff2');
  font-weight:500;
  font-display:swap;
}

@font-face {
  font-family:'Suit';
  src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Bold.woff2')
  format('woff2');
  font-weight:600;
  font-display:swap;
}

/* ===========================
   KookminUniversityHaeongSans
=========================== */


@font-face {
  font-family:'KookminUniversityHaeongSans';
  src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2310@1.0/KookminUniversityHaeongSans.woff2')
  format('woff2');
  font-weight:400;
  font-display:swap;
}

body {
  font-family:'Suit',sans-serif;
  font-weight:400;
  letter-spacing:-0.015em;
}

input,
button,
select,
textarea {
  font-family:'Suit',sans-serif;
}

/* KookminUniversityHaeongSans */
.font-haeong {
  font-family:'KookminUniversityHaeongSans',sans-serif;
  font-weight:400;
  letter-spacing:-0.045em;
}

/* Suit */
.font-suit {
  font-family:'Suit',sans-serif;
}

</style>
<script src="./js/app.js" defer></script>
<script src="./js/api.js" defer></script>
<script src="./js/ui.js" defer></script>
<script src="./js/utils.js" defer></script>


</head>
<body class="bg-surface text-onSurface">
<header class="sticky top-0 z-40 w-full bg-container/80 backdrop-blur-md border-b border-gray-100">
  <div class="flex items-center justify-between max-w-md mx-auto h-14 px-4">
    <!-- 로고 텍스트 색상을 세이지 그린으로 변경 -->
    <a href="index.html" class="text-lg font-black tracking-tighter text-[#4F7C6B]">
      소소책방
    </a>
    
    <div class="flex items-center gap-2">
      <a href="mypage.html" class="p-2 text-gray-600 hover:text-[#4F7C6B] transition-colors">
        <span class="material-symbols-outlined">account_circle</span>
      </a>
      <button id="logoutBtn" class="btn-bounce text-xs font-bold px-3 py-1.5 rounded-md bg-surface text-gray-500 hover:text-red-500 transition-colors">
        로그아웃
      </button>
    </div>
  </div>
</header>

<main class="max-w-[1400px] mx-auto px-4 py-10 flex flex-col gap-16">

<!-- 검색 히어로 -->
<section class="text-center flex flex-col items-center gap-6 py-6">
<h1
class="font-haeong text-[42px] font-normal leading-[1.3] tracking-[-0.045em]">
오늘은 어떤 책을 만나볼까요?
</h1>

<form id="homeSearchForm"
class="relative w-full max-w-lg">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
search
</span>

<input
type="text"
id="homeSearchInput"
placeholder="도서명, 저자, 출판사, ISBN"
class="w-full h-14 pl-12 pr-4 bg-container rounded-xl shadow-soft border-none outline-none focus:ring-2 focus:ring-accent-bg text-[15px] font-normal tracking-[-0.015em]">
</form>

</section>

<!-- 신간 도서 -->
<section>
<div class="flex items-center justify-between mb-5">
<h2
class="font-suit text-[24px] font-medium tracking-[-0.025em]">
신간 도서
</h2>

<a href="books.html?sort=new"
class="font-suit text-[14px] font-light tracking-[-0.01em] text-gray-400">
전체보기
</a>

</div>
<div id="newBooksList"
class="flex flex-col gap-3">
</div>
</section>

<!-- 인기 도서 -->
<section>
<div class="flex items-center justify-between mb-5">
<h2
class="font-suit text-[24px] font-medium tracking-[-0.025em]">
인기 도서 TOP 5
</h2>

  <a href="books.html?sort=popular"
class="font-suit text-[14px] font-light tracking-[-0.01em] text-gray-400">
전체보기
</a>

</div>
  
<div id="popularBooksList"
class="flex flex-col gap-3">
</div>

</section>
  
</main>
<div
id="toastContainer"
class="fixed bottom-4 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2">
</div>

</body>
<footer class="mt-12 mb-24 w-full text-center text-[12px] sm:text-[14px] font-light tracking-[-0.01em] text-gray-400/90 leading-relaxed">
  <p>
    본 사이트는 국민대학교 KMU80 성곡해옹 폰트를 사용하고 있습니다.<br>
    해당 폰트의 지식재산권은 국민대학교에 있으며,<br>
    CC BY-ND(저작자표시-변경금지) 라이선스 조건에 따라 사용되었습니다.
  </p>
</footer>
