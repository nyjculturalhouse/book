<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>소소책방 | 대여현황</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            suit: ['Suit', 'sans-serif'],
            haeong: ['KookminUniversityHaeongSans', 'sans-serif']
          },
          colors: {
            primary: { DEFAULT: "#1C1C1E", hover: "#38383A" },
            accent: { bg: "#4F7C6B", text: "#FFFFFF", hover: "#386052" },
            surface: "#F7F6F2",
            container: "#FFFFFF",
            borderColor: "#E5E5E0"
          },
          boxShadow: { soft: "0 8px 30px rgba(0,0,0,0.03)" },
          borderRadius: { xl: "18px" }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
  <link rel="stylesheet" href="./css/style.css">
  
  <style>
    /* ===========================
        SUIT Font Face
    =========================== */
    @font-face {
      font-family: 'Suit';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Light.woff2') format('woff2');
      font-weight: 300;
      font-display: swap;
    }
    @font-face {
      font-family: 'Suit';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Regular.woff2') format('woff2');
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: 'Suit';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Medium.woff2') format('woff2');
      font-weight: 500;
      font-display: swap;
    }
    @font-face {
      font-family: 'Suit';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Bold.woff2') format('woff2');
      font-weight: 600;
      font-display: swap;
    }

    /* ===========================
        KookminUniversityHaeongSans Font Face
    =========================== */
    @font-face {
      font-family: 'KookminUniversityHaeongSans';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2310@1.0/KookminUniversityHaeongSans.woff2') format('woff2');
      font-weight: 400;
      font-display: swap;
    }

    body {
      font-family: 'Suit', sans-serif;
      font-weight: 400;
      letter-spacing: -0.015em;
    }
    input, button, select, textarea {
      font-family: 'Suit', sans-serif;
    }
    .font-haeong {
      font-family: 'KookminUniversityHaeongSans', sans-serif;
    }
    .font-suit {
      font-family: 'Suit', sans-serif;
    }
  </style>

  <script src="./js/app.js" defer></script>
  <script src="./js/api.js" defer></script>
  <script src="./js/ui.js" defer></script>
  <script src="./js/utils.js" defer></script>
  <script src="./js/rentals.js" defer></script>
</head>
<body class="bg-surface text-onSurface font-suit text-[15px] font-normal tracking-[-0.015em]">
  
  <!-- Header -->
  <header class="bg-container shadow-soft sticky top-0 z-50">
    <div class="max-w-[1400px] mx-auto px-4 h-16 flex items-center justify-between">
      <a href="index.html" class="font-haeong text-[26px] font-normal tracking-[-0.04em] text-[#4F7C6B]">소소책방</a>
      <nav class="hidden md:flex items-center gap-1 font-suit text-[16px] font-medium tracking-[-0.02em]">
        <a href="index.html" class="px-4 py-2 rounded-full hover:bg-gray-100 hover:text-gray-900 transition-all duration-200">홈</a>
        <a href="books.html" class="px-4 py-2 rounded-full hover:bg-gray-100 hover:text-gray-900 transition-all duration-200">도서대여</a>
        
        <!-- 📌 대여현황 활성화 탭 주황색 스폿 수정 완료 (bg-[#E04825] -> bg-[#4F7C6B]) -->
        <a href="rentals.html" class="px-4 py-2 rounded-full bg-[#4F7C6B] text-white font-medium shadow-sm">대여현황</a>
        
        <a href="profile.html" class="px-4 py-2 rounded-full hover:bg-gray-100 hover:text-gray-900 transition-all duration-200">내정보</a>
        <button id="logoutBtn" class="px-4 py-2 rounded-full text-gray-500 hover:bg-red-50 hover:text-red-500 transition-all duration-200">로그아웃</button>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-[1400px] mx-auto px-4 py-8">
    <h2 class="font-suit text-[24px] font-medium tracking-[-0.025em] mb-6">나의 대여 현황</h2>

    <!-- Tabs -->
    <div class="flex gap-4 border-b border-gray-200 mb-6 font-suit text-[16px] font-medium tracking-[-0.02em]">
      <button id="tab-current" class="pb-3 px-2 font-semibold text-accent-bg border-b-2 border-accent-bg transition-colors">현재 대여</button>
      <button id="tab-history" class="pb-3 px-2 text-gray-500 hover:text-primary transition-colors">대여 이력</button>
    </div>

    <!-- Content Containers -->
    <div id="currentRentals" class="flex flex-col gap-4"></div>
    <div id="historyRentals" class="flex flex-col gap-4 hidden"></div>
  </main>

  <div id="toastContainer" class="fixed bottom-4 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2"></div>

  <!-- 📌 통합 라이선스 카피라이트 푸터 추가 -->
  <footer class="mt-16 mb-24 w-full text-center text-[12px] sm:text-[14px] font-light tracking-[-0.01em] text-gray-400/90 leading-relaxed">
    <p>
      본 사이트는 국민대학교 KMU80 성곡해옹 폰트를 사용하고 있습니다.<br>
      해당 폰트의 지식재산권은 국민대학교에 있으며,<br>
      CC BY-ND(저작자표시-변경금지) 라이선스 조건에 따라 사용되었습니다.
    </p>
  </footer>

</body>
</html>
