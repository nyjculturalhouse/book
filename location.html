<!-- 도서 위치 확인 모달/섹션 컨테이너 -->
<div class="p-6 bg-slate-50 rounded-2xl max-w-4xl mx-auto font-suit">
  <div class="mb-4 text-center">
    <h2 class="text-xl font-bold text-gray-800 tracking-tight">도서 위치 찾기</h2>
    <p class="text-sm text-gray-500 mt-1">찾으시는 도서의 위치가 <span id="target-location-text" class="font-semibold text-accent-bg text-base">A-03</span>에 하이라이트 표시됩니다.</p>
  </div>

  <!-- 전체 책장 맵 외곽 레이아웃 (좌/우 외부 안내 표지판 포함) -->
  <div class="flex items-center justify-center gap-4 bg-white p-6 rounded-xl border border-gray-100 shadow-soft overflow-x-auto">
    
    <!-- 좌측 외부 라벨 (차~Z) -->
    <div class="flex flex-col items-center justify-center border-r border-gray-300 pr-4 text-gray-500 font-medium shrink-0">
      <span class="text-sm tracking-wide">차 ~ Z</span>
      <div class="w-8 h-[2px] bg-gray-300 my-1"></div>
    </div>

    <!-- 메인 책장 매트릭스 GRID (7개 열 배치) -->
    <!-- 스케치 구조에 맞춰 컬럼 너비 비율 조정: A(넓음), B(중간), C(넓음), D(중간), E(넓음), F(좁음), G(넓음) -->
    <div id="bookshelf-matrix" class="grid grid-cols-[1.2fr_1fr_1.2fr_1fr_1.2fr_0.8fr_1.2fr] gap-2 w-[650px] shrink-0">
      
      <!-- JavaScript를 통해 7개 열 * 8개 행 셀들이 동적으로 생성됩니다. -->
      
    </div>

    <!-- 우측 외부 라벨 (우~이, 자~쪼) -->
    <div class="flex flex-col items-center justify-center border-l border-gray-300 pl-4 text-gray-500 font-medium shrink-0 gap-2">
      <div class="text-center">
        <span class="text-sm block">우 ~ 이</span>
        <div class="w-8 h-[2px] bg-gray-300 my-1 mx-auto"></div>
      </div>
      <div class="text-center">
        <span class="text-sm block">자 ~ 쪼</span>
        <div class="w-8 h-[2px] bg-gray-300 my-1 mx-auto"></div>
      </div>
    </div>

  </div>
  
  <!-- 하단 서랍 가이드 범례 -->
  <div class="mt-4 flex justify-center gap-6 text-[13px] text-gray-500">
    <div class="flex items-center gap-1.5">
      <span class="w-3 h-3 rounded bg-accent-bg block"></span> 선택된 도서 위치
    </div>
    <div class="flex items-center gap-1.5">
      <span class="w-3 h-3 rounded bg-gray-100 border border-gray-200 block"></span> 일반 서가
    </div>
  </div>
</div>
